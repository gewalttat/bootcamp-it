<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OS: SOCIAL-REACH | Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vignette"></div>
    <div class="terminal-container">
        <div class="scanlines"></div>
        <header class="terminal-nav">
            <span class="brand">SOCIAL_ENGINEER v2.1</span>
            <span id="timer" class="timer">00:00:00</span>
        </header>

        <div id="display" class="terminal-body">
            <p class="system-msg">> ИНИЦИАЛИЗАЦИЯ МОДУЛЯ СОЦИАЛЬНОЙ ИНЖЕНЕРИИ...</p>
        </div>

        <div id="controls" class="terminal-footer">
            <button id="step-1" class="cyber-btn">ШАГ 1: АНАЛИЗ ПРОФИЛЯ</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
